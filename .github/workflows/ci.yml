name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

defaults:
  run:
    # NOTE: Default option does not include `-o pipefail` as documented
    # unless explicitly specifying the `bash` shell.
    # https://github.com/actions/runner/issues/353
    shell: bash

jobs:
  docs:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout branch
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          submodules: 'true'

      - name: Set up Hugo
        uses: loozhengyuan/actions/setup-hugo@4b3ba8d6bd975838497af9dfcb825722fa5eb756 # main
        with:
          version: '0.157.0'

      - name: Build assets
        run: |
          hugo --source ./docs --minify

      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy --cwd ./docs
